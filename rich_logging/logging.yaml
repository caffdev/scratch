version: 1
disable_existing_loggers: false

formatters:
  rich_console:
    format: "%(message)s"
    datefmt: "[%X]"
  detailed_file:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(module)s:%(funcName)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  # NOTE: declared with `class:` here. setup_logging() rewrites this to the `()`
  # factory form at load time so the shared Console instance can be injected
  # (a live object can't be expressed in YAML).
  console:
    class: rich.logging.RichHandler
    level: INFO
    formatter: rich_console
    rich_tracebacks: true
    tracebacks_show_locals: true
    markup: true
  file:
    class: logging.handlers.TimedRotatingFileHandler
    level: DEBUG
    formatter: detailed_file
    filename: logs/app.log
    when: midnight
    interval: 1
    backupCount: 30
    encoding: utf-8
    delay: true

loggers:
  myapp:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  urllib3:
    level: WARNING
    handlers: [console, file]
    propagate: false

root:
  level: WARNING
  handlers: [console, file]